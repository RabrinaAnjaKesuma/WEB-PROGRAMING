<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale==1.0">
    <title>shadow</title>
    <style>
        p{
            color: yellow;
            text-shadow: 0px 0px 2px green;
        }
        div {
            width: 50px;
            height: 50px;
            background-color: green;
            box-shadow: 0 0 3px rgb(155, 115, 115),2px 2px 5px red,2px 2px 5px green;
        }
    </style>
    </head>

    <body>
        <p>TEKS 1</p>
        <div></div>
    </body>
</html>
