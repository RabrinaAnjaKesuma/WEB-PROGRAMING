<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>  
</head>

<body>
    <p id="hasil"></p>

    <script>
        function hitung(op, x, y) {
            if (op == '-') {
                return x - y;
            } else if (op == '+') {
                return x + y;
            } else if (op == '*') {
                return x * y;
            } else if (op == '/') {
                if (y == 0) {
                    return "y tidak boleh nol";
                }
                return x / y;
            }
        }
        let hasil = hitung('+', 5, 6);

        document.getElementById("hasil").innerHTML = hasil;
    </script>

</body>
</html>
